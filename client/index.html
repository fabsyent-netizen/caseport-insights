<!doctype html>
<html lang="en">

  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>CasePort Intelligence | Proprietary Case Acquisition Data for PI Law Firms</title>
    <meta name="description" content="Access proprietary case flow intelligence and market data. CasePort Intelligence is a premium data platform for personal injury law firms seeking case acquisition control." />
    <meta name="keywords" content="case acquisition, personal injury leads, law firm intelligence, case flow management, lead generation" />
    
    <!-- Open Graph / Social Media -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="CasePort Intelligence | Premium Case Acquisition Data" />
    <meta property="og:description" content="Real-time case flow intelligence for elite personal injury law firms." />
    <meta property="og:url" content="https://www.caseport.io/intelligence" />
    
    <!-- Geo targeting for US market -->
    <meta name="geo.placename" content="United States" />
    <meta name="geo.region" content="US" />
    
    <!-- Schema.org JSON-LD for AEO/GEO -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "CasePort",
      "url": "https://www.caseport.io",
      "description": "Premium case acquisition system for personal injury law firms",
      "areaServed": "US",
      "contactPoint": {
        "@type": "ContactPoint",
        "contactType": "Customer Service",
        "email": "access@caseport.io"
      }
    }
    </script>
    
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "@id": "https://www.caseport.io/intelligence#faq-1",
          "name": "What is a case acquisition system?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "A case acquisition system is a platform that manages the entire journey from lead capture to case signing. CasePort specializes in this for personal injury law firms, providing real-time visibility and control over case flow."
          }
        },
        {
          "@type": "Question",
          "@id": "https://www.caseport.io/intelligence#faq-2",
          "name": "How do you qualify opportunities before routing?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "We use a multi-stage qualification process: intent scoring, budget verification, authority confirmation, and timeline assessment. Only qualified leads meeting our standards are routed to your firm."
          }
        },
        {
          "@type": "Question",
          "@id": "https://www.caseport.io/intelligence#faq-3",
          "name": "What does market-capped mean?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "We limit access to 3 firms per metropolitan area to preserve lead quality and prevent market saturation. This ensures your leads remain exclusive and high-quality."
          }
        },
        {
          "@type": "Question",
          "@id": "https://www.caseport.io/intelligence#faq-4",
          "name": "How quickly can I expect to see results?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Most firms see qualified leads within 48 hours of onboarding. Measurable ROI typically appears within 30-90 days depending on your market and practice area."
          }
        }
      ]
    }
    </script>
    
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Service",
      "name": "CasePort Intelligence",
      "description": "Real-time case flow intelligence and market data platform for personal injury law firms",
      "provider": {
        "@type": "Organization",
        "name": "CasePort"
      },
      "areaServed": "US",
      "serviceType": "Case Acquisition Intelligence"
    }
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script
      defer
      src="%VITE_ANALYTICS_ENDPOINT%/umami"
      data-website-id="%VITE_ANALYTICS_WEBSITE_ID%"></script>
  </body>

</html>
